name: 'vcpkg Binary Cache'
description: 'Per-package binary caching for vcpkg using GitHub Actions cache'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  token:
    description: 'GitHub token for listing existing cache entries'
    default: ${{ github.token }}
  cache-key-prefix:
    description: 'Prefix for all cache keys (useful to isolate cache sets)'
    default: 'vcpkg-pkg'
  vcpkg-root:
    description: 'Path to vcpkg checkout. Cache is scoped to its commit hash — updating vcpkg invalidates all entries.'
    required: false
  overlay-ports:
    description: 'Path to overlay ports directory. Cache is scoped to a content hash — changing any overlay file invalidates all entries.'
    required: false
  installed-dir:
    description: 'Path to vcpkg_installed directory. Used to resolve port names for cache keys. Auto-detected from $GITHUB_WORKSPACE/vcpkg_installed if not set.'
    required: false
  save-cache:
    description: 'Save new packages to cache in the post step. Set to false for consumer jobs that only restore.'
    default: 'true'
  key:
    description: 'Extra key mixed into the cache scope. Use to include compiler version, system packages, or other factors that affect ABI. Supports multiline (one entry per line).'
    required: false
  run:
    description: 'Command to run after restoring cache (e.g., "vcpkg install"). On failure, referenced log files are dumped in collapsible sections, partial results are still cached, and the step fails.'
    required: false

outputs:
  archives-dir:
    description: 'Absolute path to the vcpkg binary archives directory'
  cache-hit:
    description: 'Whether all packages from the last successful build are still present in the cache'

runs:
  using: 'node24'
  main: 'dist/restore/index.js'
  post: 'dist/save/index.js'
  post-if: 'always()'
